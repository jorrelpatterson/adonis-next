<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta http-equiv="refresh" content="0; url=/app">
<title>Adonis — redirecting…</title>
<style>html,body{height:100%;width:100%;margin:0;padding:0;background:#060709;color:#E8D5B7;font-family:-apple-system,BlinkMacSystemFont,sans-serif;display:flex;align-items:center;justify-content:center}</style>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(regs){regs.forEach(function(r){r.unregister()})})}if(typeof caches!=='undefined'){caches.keys().then(function(names){names.forEach(function(name){caches.delete(name)})})}</script>
</head>
<body>
<p>Redirecting to <a href="/app" style="color:#E8D5B7">the new Adonis app</a>…</p>
<script>location.replace('/app')</script>
</body>
</html>
