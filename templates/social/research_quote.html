<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Research Quote — advnce labs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;700;900&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #F4F2EE;
    color: #1A1C22;
    font-family: 'Barlow Condensed', sans-serif;
    overflow: hidden;
  }
  .canvas {
    width: 1080px;
    height: 1080px;
    padding: 80px 80px 100px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* TOP */
  .top-lockup {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    align-self: flex-start;
  }
  .top-lockup svg { height: 36px; width: auto; }
  .wordmark {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.04em;
    color: #1A1C22;
  }
  .wordmark span { color: #7A7D88; }

  /* CENTER QUOTE AREA */
  .quote-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    max-width: 860px;
    width: 100%;
  }
  .open-quote {
    font-family: 'Cormorant Garamond', serif;
    font-size: 140px;
    color: #00A0A8;
    line-height: 0.6;
    margin-bottom: 16px;
    align-self: flex-start;
    margin-left: 20px;
  }
  .pull-quote {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(36px, 4.5vw, 56px);
    color: #1A1C22;
    line-height: 1.35;
    text-align: center;
    max-width: 820px;
  }
  .citation {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #00A0A8;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-top: 40px;
    text-align: center;
  }

  /* BOTTOM */
  .bottom-bar {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .disclaimer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    color: #7A7D88;
    text-transform: lowercase;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="top-lockup">
    <svg viewBox="0 0 48 28" fill="none">
      <path d="M2 24L8 19L14 22L20 14L26 17L32 9L38 12L46 3" stroke="#00A0A8" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="32" cy="9" r="2" fill="#00A0A8"/>
      <circle cx="38" cy="12" r="2" fill="#E07C24"/>
      <circle cx="46" cy="3" r="2.5" fill="#E07C24"/>
    </svg>
    <div class="wordmark">advnce <span>labs</span></div>
  </div>

  <div class="quote-section">
    <div class="open-quote">&ldquo;</div>
    <div class="pull-quote">{{QUOTE}}</div>
    <div class="citation">{{CITATION_FULL}}</div>
  </div>

  <div class="bottom-bar">
    <div class="disclaimer">research-grade · not for human consumption</div>
  </div>
</div>
</body>
</html>
