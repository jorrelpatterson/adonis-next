<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Mechanism Diagram — advnce labs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;700;900&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #F4F2EE;
    color: #1A1C22;
    font-family: 'Barlow Condensed', sans-serif;
    overflow: hidden;
  }
  .canvas {
    width: 1080px;
    height: 1080px;
    padding: 80px;
    display: flex;
    flex-direction: column;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .lockup {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .lockup svg { height: 40px; width: auto; }
  .wordmark {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.04em;
    color: #1A1C22;
    line-height: 1;
  }
  .wordmark span { color: #7A7D88; }
  .eyebrow-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #00A0A8;
    text-transform: uppercase;
    letter-spacing: 0.25em;
  }

  /* DIAGRAM AREA */
  .diagram-area {
    flex: 0 0 500px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px solid rgba(0,160,168,0.2);
    border-radius: 4px;
    margin-top: 48px;
    background: rgba(0,160,168,0.03);
    position: relative;
    overflow: hidden;
  }
  .diagram-placeholder {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #7A7D88;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .diagram-area svg,
  .diagram-area img {
    max-width: 100%;
    max-height: 100%;
  }

  /* LOWER SECTION */
  .lower-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding-top: 32px;
    gap: 16px;
  }
  .pathway-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 40px;
    text-transform: uppercase;
    color: #1A1C22;
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .explainer-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 24px;
    color: #1A1C22;
    line-height: 1.5;
    max-width: 820px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .bottom-bar {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-shrink: 0;
    margin-top: 24px;
  }
  .bottom-lockup {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .bottom-lockup svg { height: 28px; width: auto; }
  .bottom-wordmark {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.04em;
    color: #7A7D88;
  }
  .citation {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: #7A7D88;
    text-align: right;
    max-width: 300px;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="top-bar">
    <div class="lockup">
      <svg viewBox="0 0 48 28" fill="none">
        <path d="M2 24L8 19L14 22L20 14L26 17L32 9L38 12L46 3" stroke="#00A0A8" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="32" cy="9" r="2" fill="#00A0A8"/>
        <circle cx="38" cy="12" r="2" fill="#E07C24"/>
        <circle cx="46" cy="3" r="2.5" fill="#E07C24"/>
      </svg>
      <div class="wordmark">advnce <span>labs</span></div>
    </div>
    <div class="eyebrow-tag">RESEARCH FILE</div>
  </div>

  <div class="diagram-area">
    {{DIAGRAM_SVG}}
    <!-- Placeholder shown when no SVG injected -->
    <script>
      if (!document.querySelector('.diagram-area svg:not(:empty), .diagram-area img')) {
        document.querySelector('.diagram-area').innerHTML += '<span class="diagram-placeholder">[ mechanism diagram ]</span>';
      }
    </script>
  </div>

  <div class="lower-section">
    <div class="pathway-label">{{PATHWAY_LABEL}}</div>
    <div class="explainer-text">{{EXPLAINER_TEXT}}</div>
  </div>

  <div class="bottom-bar">
    <div class="bottom-lockup">
      <svg viewBox="0 0 48 28" fill="none">
        <path d="M2 24L8 19L14 22L20 14L26 17L32 9L38 12L46 3" stroke="#00A0A8" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="32" cy="9" r="2" fill="#00A0A8"/>
        <circle cx="38" cy="12" r="2" fill="#E07C24"/>
        <circle cx="46" cy="3" r="2.5" fill="#E07C24"/>
      </svg>
      <div class="bottom-wordmark">advnce labs</div>
    </div>
    <div class="citation">{{CITATION_SHORT}}</div>
  </div>
</div>
</body>
</html>
