<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Compound Card — advnce labs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;700;900&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #F4F2EE;
    color: #1A1C22;
    font-family: 'Barlow Condensed', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .canvas {
    width: 1080px;
    height: 1080px;
    padding: 80px 80px 100px 80px;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* TOP BAR */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .lockup {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .lockup svg {
    height: 40px;
    width: auto;
  }
  .wordmark {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.04em;
    color: #1A1C22;
    line-height: 1;
  }
  .wordmark span {
    color: #7A7D88;
  }
  .eyebrow-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #00A0A8;
    text-transform: uppercase;
    letter-spacing: 0.25em;
  }

  /* HERO COMPOUND NAME */
  .hero-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-top: 20px;
  }
  .compound-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(100px, 13vw, 140px);
    text-transform: uppercase;
    color: #1A1C22;
    line-height: 0.9;
    letter-spacing: -0.01em;
  }
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 40px;
    color: #00A0A8;
    margin-top: 16px;
    line-height: 1.2;
  }

  /* MECHANISM BULLETS */
  .bullets {
    margin-top: 48px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .bullet {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-size: 15px;
    line-height: 1.5;
    font-family: Helvetica, Arial, sans-serif;
    font-weight: 400;
    color: #1A1C22;
    max-width: 680px;
  }
  .bullet-arrow {
    color: #00A0A8;
    flex-shrink: 0;
    font-size: 15px;
    margin-top: 1px;
  }

  /* BOTTOM */
  .bottom-bar {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-shrink: 0;
    margin-top: 32px;
  }
  .disclaimer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    color: #7A7D88;
    text-transform: lowercase;
    letter-spacing: 0.05em;
  }
  .citation {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: #7A7D88;
    text-align: right;
    max-width: 300px;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="top-bar">
    <div class="lockup">
      <svg viewBox="0 0 48 28" fill="none">
        <path d="M2 24L8 19L14 22L20 14L26 17L32 9L38 12L46 3" stroke="#00A0A8" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="32" cy="9" r="2" fill="#00A0A8"/>
        <circle cx="38" cy="12" r="2" fill="#E07C24"/>
        <circle cx="46" cy="3" r="2.5" fill="#E07C24"/>
      </svg>
      <div class="wordmark">advnce <span>labs</span></div>
    </div>
    <div class="eyebrow-tag">{{EYEBROW_TAG}}</div>
  </div>

  <div class="hero-section">
    <div class="compound-name">{{COMPOUND_NAME}}</div>
    <div class="tagline">{{TAGLINE}}</div>

    <div class="bullets">
      <div class="bullet">
        <span class="bullet-arrow">→</span>
        <span>{{BULLET_1}}</span>
      </div>
      <div class="bullet">
        <span class="bullet-arrow">→</span>
        <span>{{BULLET_2}}</span>
      </div>
      <div class="bullet">
        <span class="bullet-arrow">→</span>
        <span>{{BULLET_3}}</span>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="disclaimer">research-grade · not for human consumption</div>
    <div class="citation">{{CITATION_SHORT}}</div>
  </div>
</div>
</body>
</html>
